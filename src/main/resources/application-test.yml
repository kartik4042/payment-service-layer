spring:
  application:
    name: payment-orchestration-service-test
  
  # Test Database Configuration (H2 in-memory)
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  # JPA Configuration for Tests
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  # Test Redis Configuration (Embedded)
  redis:
    host: localhost
    port: 6379
  
  # Disable Flyway for tests
  flyway:
    enabled: false
  
  # Disable Zipkin for tests
  zipkin:
    enabled: false
  
  sleuth:
    enabled: false

# Server Configuration for Tests
server:
  port: 0 # Random port

# Management & Actuator for Tests
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    export:
      prometheus:
        enabled: false

# Resilience4j Circuit Breaker for Tests
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 2
    instances:
      providerA:
        base-config: default
      providerB:
        base-config: default
  
  retry:
    configs:
      default:
        max-attempts: 2
        wait-duration: 100ms
    instances:
      paymentRetry:
        base-config: default

# Application Configuration for Tests
payment:
  orchestration:
    providers:
      providerA:
        name: "Test Provider A"
        base-url: http://localhost:8081
        api-key: test-key-a
        timeout: 1000
        enabled: true
        priority: 1
        supported-countries:
          - US
          - CA
      providerB:
        name: "Test Provider B"
        base-url: http://localhost:8082
        api-key: test-key-b
        timeout: 1000
        enabled: true
        priority: 2
        supported-countries:
          - IN
          - SG
    
    routing:
      strategy: GEOGRAPHIC
      fallback-enabled: true
      health-check-interval: 10s
    
    retry:
      max-attempts: 2
      initial-delay: 100
      max-delay: 1000
      multiplier: 2.0
    
    idempotency:
      ttl: 3600
      enabled: true
    
    webhook:
      secret: test-webhook-secret
      signature-header: X-Payment-Signature
      timestamp-header: X-Payment-Timestamp
      replay-window: 300
    
    audit:
      enabled: true
      retention-days: 30
      async: false

# Logging Configuration for Tests
logging:
  level:
    root: INFO
    com.payment.orchestration: DEBUG
    org.springframework.web: WARN
    org.hibernate.SQL: DEBUG


